<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 알림함</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <h2 class="mb-4">🔔 내 알림함</h2>
        <a href="/board" class="btn btn-secondary mb-3">← 게시판으로 돌아가기</a>
        
        <div class="list-group shadow-sm">
            {% for notif in notifications %}
                <a href="{{ notif.link }}" class="list-group-item list-group-item-action py-3 {% if not notif.is_read %}bg-light fw-bold{% endif %}">
                    <div class="d-flex w-100 justify-content-between">
                        <h6 class="mb-1 text-primary">{{ notif.message }}</h6>
                        <small class="text-muted">{{ notif.date_created.strftime('%m/%d %H:%M') }}</small>
                    </div>
                </a>
            {% else %}
                <div class="list-group-item text-center py-5 text-muted">
                    새로운 알림이 없습니다.
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
