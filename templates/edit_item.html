<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>분실물 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="max-width: 500px; width: 100%;">
        <h3 class="mb-4 text-center">✏️ 분실물 설명 수정</h3>
        
        <div class="text-center mb-3">
            <img src="{{ url_for('static', filename='uploads/' + item.image_path) }}" class="rounded shadow-sm" style="width: 200px; height: 200px; object-fit: cover;">
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">물건 설명 수정하기</label>
                <textarea name="description" class="form-control" rows="3" required>{{ item.description }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">수정 완료</button>
        </form>
        <div class="mt-3 text-center">
            <a href="/board" class="text-muted">취소하고 돌아가기</a>
        </div>
    </div>
</body>
</html>
