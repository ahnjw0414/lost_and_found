<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>학교 분실물 센터</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    
    <div class="text-center p-5 bg-white shadow rounded" style="max-width: 500px; width: 100%;">
        <h1 class="mb-3">🕵️‍♂️ 학교 분실물 센터</h1>
        <p class="text-muted mb-4">내 소중한 물건을 빠르고 쉽게 찾아보세요.</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert alert-danger">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <div class="d-grid gap-3">
            <a href="/login" class="btn btn-primary btn-lg">로그인하고 시작하기</a>
            <a href="/signup" class="btn btn-outline-secondary btn-lg">처음이신가요? 회원가입</a>
        </div>
    </div>

</body>
</html>
