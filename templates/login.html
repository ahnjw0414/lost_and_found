<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="card shadow mx-auto" style="max-width: 400px;">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">🏫 분실물 센터 로그인</h3>
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger small">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label">이메일</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">비밀번호</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">로그인</button>
                </form>
                <div class="text-center mt-3">
                    <a href="/signup" class="text-decoration-none small">계정이 없으신가요? 회원가입</a>
                    <br>
                    <a href="/reset_password" class="text-danger small text-decoration-none mt-2 d-inline-block">비밀번호를 잊으셨나요? (재설정)</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
