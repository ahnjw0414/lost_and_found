<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>습득물 제보하기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="max-width: 500px; width: 100%;">
        <h3 class="mb-4 text-center">📢 주운 물건 제보하기</h3>
        <p class="text-muted text-center">선생님만 확인할 수 있는 비밀 메시지입니다.</p>

        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label fw-bold">어디서 주우셨나요?</label>
                <input type="text" name="location" class="form-control" placeholder="예: 2층 남자 화장실 세면대 위" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">물건 설명</label>
                <textarea name="description" class="form-control" rows="2" placeholder="예: 파란색 나이키 필통입니다." required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold text-primary">언제 교무실로 가져다 주실 건가요?</label>
                <input type="text" name="dropoff_time" class="form-control border-primary" placeholder="예: 오늘 점심시간, 5교시 쉬는시간 등" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">사진 첨부 (선택)</label>
                <input type="file" name="image" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-secondary w-100">선생님께 제보 보내기</button>
        </form>
        <div class="mt-3 text-center"><a href="/board" class="text-muted">취소하고 게시판으로</a></div>
    </div>
</body>
</html>
