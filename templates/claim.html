<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>분실물 찾기 신청</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="max-width: 500px; width: 100%;">
        <h3 class="mb-4 text-center">🙋‍♂️ 이거 제 거예요!</h3>
        
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='uploads/' + item.image_path) }}" class="rounded shadow-sm" style="width: 200px; height: 200px; object-fit: cover;">
            <p class="mt-2 fw-bold">{{ item.description }}</p>
        </div>

        <div class="alert alert-primary text-center">
            <b>{{ current_user.student_id }} {{ current_user.name }}</b> 님의 이름으로 신청서가 접수됩니다.
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">수령 방문 예정 시간</label>
                <input type="text" name="pickup_time" class="form-control border-primary" placeholder="예: 오늘 점심시간" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">신청 완료하기</button>
        </form>
        <div class="mt-3 text-center">
            <a href="/board" class="text-muted">취소하고 돌아가기</a>
        </div>
    </div>
</body>
</html>
