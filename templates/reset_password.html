<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 재설정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="card shadow mx-auto" style="max-width: 450px;">
            <div class="card-body p-4">
                <h4 class="text-center mb-3">비밀번호 재설정 🔑</h4>
                <p class="text-muted small text-center mb-4">본인 확인을 위해 가입 정보를 입력해주세요.</p>
                
                <form action="/reset_password" method="POST">
                    <div class="mb-3">
                        <label class="form-label">이메일</label>
                        <input type="email" name="email" class="form-control" placeholder="example@ps.hs.kr" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">이름</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="col">
                            <label class="form-label">학번</label>
                            <input type="text" name="student_id" class="form-control" placeholder="10101" required>
                        </div>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label">새로운 비밀번호</label>
                        <input type="password" name="new_password" class="form-control" placeholder="변경할 비밀번호 입력" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">본인 확인 및 비밀번호 변경</button>
                    <a href="/login" class="btn btn-link w-100 text-secondary text-decoration-none mt-2 small">로그인으로 돌아가기</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
