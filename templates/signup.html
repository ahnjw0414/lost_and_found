<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="max-width: 400px; width: 100%;">
        <h3 class="text-center mb-4">📝 회원가입</h3>
        {% with messages = get_flashed_messages() %}
          {% if messages %}<div class="alert alert-danger">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <input type="text" name="student_id" class="form-control" placeholder="학번 (예: 20401) *선생님은 00000" required>
            </div>
            <div class="mb-3">
                <input type="text" name="name" class="form-control" placeholder="이름 (예: 홍길동)" required>
            </div>
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="사용할 이메일" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="비밀번호" required>
            </div>
            <button type="submit" class="btn btn-success w-100">가입하기</button>
        </form>
        <div class="mt-3 text-center"><a href="/" class="text-decoration-none text-muted">홈으로 돌아가기</a></div>
    </div>
</body>
</html>
